<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极简注册测试版</title>
<style>
/* 只保留核心样式，避免干扰 */
.auth-box{max-width:400px;margin:50px auto;padding:20px;border:1px solid #eee;border-radius:8px}
.input-row{margin-bottom:15px}
input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}
.btn{width:100%;padding:10px;background:#277ef0;color:white;border:none;border-radius:4px;cursor:pointer}
.tip{color:red;text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="auth-box">
  <h3 style="text-align:center">注册测试</h3>
  <div class="input-row">
    <input type="text" id="user" placeholder="用户名">
  </div>
  <div class="input-row">
    <input type="password" id="pwd" placeholder="密码（≥6位）">
  </div>
  <div class="input-row">
    <select id="safeQ">
      <option value="">选择密保问题</option>
      <option value="1">母校名称</option>
      <option value="2">宠物名字</option>
    </select>
  </div>
  <div class="input-row">
    <input type="text" id="safeA" placeholder="密保答案">
  </div>
  <button class="btn" onclick="register()">点击注册（一定有反馈）</button>
  <div class="tip" id="tip"></div>
</div>

<script>
// 最简单的注册逻辑，只保证「点击有反馈」
function register() {
  const user = document.getElementById("user").value;
  const pwd = document.getElementById("pwd").value;
  const safeQ = document.getElementById("safeQ").value;
  const safeA = document.getElementById("safeA").value;
  const tip = document.getElementById("tip");

  // 不管填对填错，都显示提示（绝不会没反应）
  if (!user) {
    tip.textContent = "❌ 请输入用户名";
  } else if (pwd.length < 6) {
    tip.textContent = "❌ 密码不少于6位";
  } else if (!safeQ) {
    tip.textContent = "❌ 请选择密保问题";
  } else if (!safeA) {
    tip.textContent = "❌ 请填写密保答案";
  } else {
    // 模拟注册成功
    tip.textContent = "✅ 注册成功！用户名：" + user;
    // 清空表单
    document.getElementById("user").value = "";
    document.getElementById("pwd").value = "";
    document.getElementById("safeQ").value = "";
    document.getElementById("safeA").value = "";
  }
}
</script>
</body>
</html>
