<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT制作管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .tab-group {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            border: none;
            background: none;
            transition: all 0.3s;
        }

        .tab.active {
            color: #409eff;
            border-bottom: 2px solid #409eff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #409eff;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #338eef;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .tips {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PPT制作管理系统</h1>
        
        <div class="tab-group">
            <button class="tab active" data-target="loginForm">登录</button>
            <button class="tab" data-target="registerForm">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="form-container active">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPwd" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="userLogin()">登录</button>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="form-container">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPwd" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="userRegister()">注册</button>
        </div>

        <div class="tips">支持账号密码登录 / 注册</div>
    </div>

    <script>
        // 选项卡切换
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const target = tab.dataset.target;
                document.querySelectorAll('.form-container').forEach(form => {
                    form.classList.remove('active');
                });
                document.getElementById(target).classList.add('active');
            });
        });

        // 模拟用户数据（真实使用可替换为Supabase/后端）
        let userList = JSON.parse(localStorage.getItem('userList')) || [];

        // 注册
        function userRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPwd').value.trim();

            if (!username || !password) {
                alert('请填写完整信息！');
                return;
            }

            const user = userList.find(item => item.username === username);
            if (user) {
                alert('用户名已存在！');
                return;
            }

            userList.push({ username, password });
            localStorage.setItem('userList', JSON.stringify(userList));
            alert('注册成功！请登录');
            
            // 切换到登录
            document.querySelector('.tab[data-target="loginForm"]').click();
        }

        // 登录
        function userLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPwd').value.trim();

            if (!username || !password) {
                alert('请填写完整信息！');
                return;
            }

            const user = userList.find(item => item.username === username && item.password === password);
            if (!user) {
                alert('用户名或密码错误！');
                return;
            }

            alert('登录成功！');
            // 登录成功后可跳转到主页
            // location.href = 'home.html';
        }
    </script>
</body>
</html>
