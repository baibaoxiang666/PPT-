<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT接单管理系统 | 管理员后台</title>
<style>
  /* ===== 全局重置 & 基础样式 ===== */
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Inter",system-ui,-apple-system,BlindMacOSXFont,sans-serif}
  body{background:#f6f8fa;margin:0;padding:0;color:#24292f}
  /* ===== 布局容器 ===== */
  .app-container{display:flex;min-height:100vh}
  /* ===== 侧边栏 ===== */
  .sidebar{width:260px;background:#ffffff;border-right:1px solid #e1e4e8;padding:24px 0;display:flex;flex-direction:column}
  .sidebar-logo{font-size:18px;font-weight:700;color:#24292f;padding:0 24px 20px;margin-bottom:20px;border-bottom:1px solid #e1e4e8}
  .sidebar-menu{list-style:none;padding:0}
  .sidebar-menu li{margin:4px 0}
  .sidebar-menu a{display:flex;align-items:center;padding:10px 24px;border-radius:6px;color:#586069;text-decoration:none;font-size:14px;font-weight:500}
  .sidebar-menu a.active{background:#0969da;color:#ffffff}
  .sidebar-menu a:hover:not(.active){background:#f6f8fa;color:#24292f}
  .sidebar-menu .icon{margin-right:12px;font-size:16px;width:20px;text-align:center}
  /* ===== 主内容区 ===== */
  .main-content{flex:1;padding:24px;display:flex;flex-direction:column}
  /* ===== 顶部导航栏 ===== */
  .top-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e1e4e8}
  .nav-left{font-size:16px;font-weight:600;color:#24292f}
  .nav-right{display:flex;gap:12px;align-items:center}
  .user-info{display:flex;align-items:center;gap:8px;color:#24292f;font-size:14px}
  .user-info .role{background:#e1e4e8;padding:2px 8px;border-radius:12px;font-size:12px;color:#586069}
  .btn-nav{padding:8px 12px;border-radius:6px;border:1px solid #e1e4e8;background:#ffffff;color:#24292f;font-size:13px;cursor:pointer}
  .btn-nav:hover{background:#f6f8fa}
  .btn-nav.primary{background:#0969da;color:#ffffff;border-color:#0969da}
  /* ===== 数据卡片 ===== */
  .data-card{background:#ffffff;border:1px solid #e1e4e8;border-radius:10px;padding:24px;margin-bottom:20px}
  .card-title{font-size:16px;font-weight:600;color:#24292f;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .card-title .icon{color:#0969da}
  /* ===== 订单列表样式 ===== */
  .order-table{width:100%;border-collapse:collapse}
  .order-table th{text-align:left;padding:12px 16px;background:#f6f8fa;font-size:13px;font-weight:600;color:#586069;border-bottom:1px solid #e1e4e8}
  .order-table td{padding:16px;border-bottom:1px solid #e1e4e8;font-size:14px;color:#24292f}
  .order-table tr:hover{background:#f6f8fa}
  .status-badge{padding:4px 8px;border-radius:12px;font-size:12px;font-weight:500}
  .status-pending{background:#fff8e5;color:#966514}
  .status-completed{background:#dafbe1;color:#1a7f37}
  /* ===== 弹窗样式 ===== */
  .modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:1000}
  .modal-box{background:#fff;padding:28px;border-radius:12px;width:90%;max-width:440px;border:1px solid #e1e4e8}
  .modal-title{font-size:18px;font-weight:600;color:#24292f;margin-bottom:20px}
  .form-group{margin-bottom:20px}
  .form-group label{display:block;margin-bottom:8px;font-size:14px;font-weight:500;color:#24292f}
  .form-control{width:100%;padding:10px 12px;border:1px solid #e1e4e8;border-radius:6px;font-size:14px}
  .form-control:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,0.2)}
  .pwd-row{position:relative}
  .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#6a737d}
  .modal-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:24px}
  .btn{padding:10px 16px;border-radius:6px;border:1px solid transparent;font-size:14px;font-weight:500;cursor:pointer}
  .btn-default{background:#ffffff;border-color:#e1e4e8;color:#24292f}
  .btn-primary{background:#0969da;border-color:#0969da;color:#ffffff}
  /* ===== 空状态 ===== */
  .empty-state{text-align:center;padding:40px 20px;color:#586069}
  .empty-state .icon{font-size:48px;margin-bottom:16px;color:#e1e4e8}
</style>
</head>
<body>

<div class="app-container">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-logo">📊 PPT接单管理</div>
    <ul class="sidebar-menu">
      <li><a href="javascript:;" class="active"><span class="icon">📋</span> 接单记录汇总</a></li>
      <!-- 管理员隐藏新增订单入口 -->
    </ul>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 顶部导航 -->
    <div class="top-nav">
      <div class="nav-left">接单记录汇总</div>
      <div class="nav-right">
        <div class="user-info">
          <span id="show_name">管理员</span>
          <span class="role" id="show_role">管理员</span>
        </div>
        <button class="btn-nav" onclick="openModal('pwdModal')">🔑 修改密码</button>
        <button class="btn-nav primary" onclick="handleLogout()">🚪 退出登录</button>
      </div>
    </div>

    <!-- 订单数据卡片 -->
    <div class="data-card">
      <div class="card-title"><span class="icon">📋</span> 接单记录台账</div>
      <div id="order_list" class="order-table">
        <div class="empty-state">
          <div class="icon">📭</div>
          <div>暂无订单数据，开始记录吧</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-mask" id="pwdModal">
  <div class="modal-box">
    <div class="modal-title">修改账号密码</div>
    
    <div class="form-group">
      <label for="old_pwd">原密码</label>
      <div class="pwd-row">
        <input id="old_pwd" type="password" class="form-control" placeholder="请输入原登录密码">
        <span class="eye" onclick="eye('old_pwd')">👁️</span>
      </div>
    </div>

    <div class="form-group">
      <label for="new_pwd">新密码</label>
      <div class="pwd-row">
        <input id="new_pwd" type="password" class="form-control" placeholder="设置新密码（不少于6位）">
        <span class="eye" onclick="eye('new_pwd')">👁️</span>
      </div>
    </div>

    <div class="form-group">
      <label for="confirm_pwd">确认新密码</label>
      <div class="pwd-row">
        <input id="confirm_pwd" type="password" class="form-control" placeholder="再次输入新密码">
        <span class="eye" onclick="eye('confirm_pwd')">👁️</span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('pwdModal')">取消</button>
      <button class="btn btn-primary" onclick="updatePwd()">确认修改</button>
    </div>
  </div>
</div>

<script>
// ======================= 【你自己填写这2个！】 =======================
const SUPABASE_URL = "【在这里填 你的 Project URL】";
const SUPABASE_KEY = "【在这里填 你的 anon public API Key】";
// ====================================================================

// 眼睛显隐密码
function eye(id) {
  let i = document.getElementById(id);
  i.type = i.type === "password" ? "text" : "password";
}

// 弹窗控制
function openModal(id) {
  document.getElementById(id).style.display = "flex";
}
function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

// 退出登录
function handleLogout() {
  if(confirm("确定要退出登录吗？")) {
    localStorage.clear();
    window.location.reload();
  }
}

// 初始化（模拟管理员身份，实际对接云端后替换）
function initAdmin() {
  document.getElementById("authPage")?.remove(); // 移除登录页（如果存在）
  document.querySelector(".app-container").style.display = "flex";
  
  let name = localStorage.getItem("username") || "管理员";
  document.getElementById("show_name").innerText = name;
  document.getElementById("show_role").innerText = "管理员";
  
  loadOrders();
}

// 保存订单（模拟，后续对接云端）
function saveOrder() {
  alert("功能已预留，后续对接云端数据库");
}

// 加载订单（模拟，实际对接云端）
function loadOrders() {
  const listEl = document.getElementById("order_list");
  // 这里后续替换为从 Supabase 读取所有订单的逻辑
  listEl.innerHTML = `
    <div class="empty-state">
      <div class="icon">📭</div>
      <div>云端连接成功，正在加载订单数据...</div>
    </div>
  `;
}

// 修改密码（模拟，实际对接云端）
function updatePwd() {
  let oldPwd = document.getElementById("old_pwd").value.trim();
  let newPwd = document.getElementById("new_pwd").value.trim();
  let confirmPwd = document.getElementById("confirm_pwd").value.trim();
  
  let realOldPwd = "123456"; // 模拟原密码，实际从云端读取
  
  if(oldPwd !== realOldPwd) return alert("原密码输入错误！");
  if(newPwd.length < 6) return alert("新密码长度不能少于6位");
  if(newPwd !== confirmPwd) return alert("两次输入的新密码不一致！");

  alert("密码修改成功！请重新登录以生效");
  closeModal('pwdModal');
  handleLogout();
}

// 页面加载自动初始化
window.onload = function() {
  // 如果是管理员直接进入后台
  initAdmin();
};
</script>
</body>
</html>
