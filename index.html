<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的订单</title>
</head>
<body>
    <h1>我的订单</h1>
    <div id="orderList"></div>

    <script src="cloud.js"></script>
    <script>
        async function renderOrders() {
            const orderListEl = document.getElementById('orderList');
            const list = await getOrders();
            let html = '';
            if (list.length === 0) {
                html = '<p>暂无订单</p>';
            } else {
                list.forEach(o => {
                    html += `<div>
                        <strong>${o.title || '无标题'}</strong>
                        - 金额：${o.money || 0}元
                        - 用户：${o.user}
                        - 时间：${o.time}
                    </div>`;
                });
            }
            orderListEl.innerHTML = html;
        }
        renderOrders();
    </script>
</body>
</html>
