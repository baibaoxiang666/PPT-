<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT接单管理系统 V2.0.0 稳定完整版</title>
<!-- 版本标注：V2.0.0 | 核心功能：全需求落地+登录后正常显示 -->
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8"></script>
<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --blue:#277ef0;--green:#00b42a;--orange:#ff7d00;--red:#f53f3f;--purple:#9f7aea;
  --bg:#f8f9fa;--card:#fff;--border:#e9ecef;--gray:#6c757d;--light:#f1f3f5;--text:#212529;
  --shadow:0 2px 8px rgba(0,0,0,0.06);--hover:0 4px 12px rgba(0,0,0,0.1);
}
[data-theme="dark"]{
  --bg:#121212;--card:#1e1e1e;--border:#333;--gray:#aaa;--light:#2d2d2d;--text:#e0e0e0;
  --shadow:0 2px 8px rgba(0,0,0,0.3);--hover:0 4px 12px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",-apple-system,sans-serif}
body{background:var(--bg);padding:20px;max-width:1800px;margin:0 auto;color:var(--text);transition:background 0.3s}
/* 顶部导航 */
.top-bar{
  position:sticky;top:0;background:var(--card);border-radius:12px;padding:16px 24px;margin-bottom:20px;
  box-shadow:var(--shadow);z-index:100;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.user-info{display:flex;align-items:center;gap:10px}
.role-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.role-super{background:#f53f3f;color:#fff}
.role-sub{background:#ff7d00;color:#fff}
.role-design{background:#00b42a;color:#fff}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-warning{background:var(--orange);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-default{background:var(--light);color:var(--text);border:1px solid var(--border)}
.btn:hover{transform:translateY(-1px);box-shadow:var(--hover)}
/* 卡片通用样式 */
.card{background:var(--card);border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:var(--shadow);transition:all 0.3s}
.card-header{font-size:18px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
/* 表单样式 */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:16px;margin-bottom:20px}
.form-item{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;color:var(--gray);font-weight:500}
input,select,textarea{
  width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;
  background:var(--card);color:var(--text);font-size:14px;outline:none;transition:all 0.2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(39,126,240,0.1)}
textarea{min-height:80px;resize:vertical}
/* 渠道标签 */
.channel-tags{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.channel-tag{padding:6px 12px;background:var(--light);border-radius:16px;font-size:12px;cursor:pointer;transition:all 0.2s}
.channel-tag:hover{background:var(--blue);color:#fff}
.channel-tag.active{background:var(--blue);color:#fff}
/* 统计看板 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:linear-gradient(135deg, var(--light), var(--card));border-radius:10px;padding:20px;
  box-shadow:var(--shadow);transition:all 0.3s;cursor:pointer;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--hover)}
.stat-card .icon{font-size:24px;margin-bottom:8px;color:var(--blue)}
.stat-card .stat-title{font-size:13px;color:var(--gray);margin-bottom:4px}
.stat-card .stat-value{font-size:28px;font-weight:bold;color:var(--text);font-family:'Courier New',monospace}
/* 图表区域 */
.chart-container{display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:20px;margin-top:20px}
.chart-card{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);height:300px}
/* 表格样式 */
.table-wrapper{max-height:600px;overflow-y:auto;border-radius:8px;border:1px solid var(--border);margin-top:16px}
table{width:100%;border-collapse:collapse;background:var(--card)}
th,td{padding:14px 12px;text-align:center;border-bottom:1px solid var(--border);font-size:14px}
th{background:var(--light);position:sticky;top:0;z-index:10;font-weight:600}
tr:hover{background:var(--light);transition:background 0.2s}
/* 状态标签 */
.status-badge{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500}
.status-wait{background:#fff3cd;color:#856404}
.status-doing{background:#d1ecf1;color:#0c5460}
.status-deliver{background:#d4edda;color:#155724}
.status-settle{background:#e0cffc;color:#5a2ca0}
.status-apply{background:#fff8e1;color:#ff9800}
.status-abnormal{background:#f8d7da;color:#721c24}
.status-transfer{background:#dee2e6;color:#383d41}
/* 搜索筛选区 */
.search-filter{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{padding-left:40px;width:100%}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray)}
.filter-select{min-width:150px}
/* 弹窗样式 */
.modal-backdrop{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);
  display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px);
}
.modal{
  background:var(--card);border-radius:12px;padding:28px;width:90%;max-width:600px;max-height:85vh;
  overflow-y:auto;box-shadow:var(--hover);animation:modalIn 0.3s ease-out;
}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{font-size:18px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray)}
.modal-footer{margin-top:24px;display:flex;gap:10px;justify-content:flex-end}
/* 提示框 */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:24px;
  z-index:1000;transition:transform 0.3s;box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.toast.show{transform:translateX(-50%) translateY(0)}
/* 响应式调整 */
@media(max-width:1200px){
  .chart-container{grid-template-columns:1fr}
}
@media(max-width:768px){
  body{padding:12px}
  .top-bar{flex-direction:column;align-items:stretch}
  .form-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  th,td{padding:10px 6px;font-size:12px}
  .btn{padding:8px 12px;font-size:13px}
}
/* 登录注册页面 */
.auth-container{max-width:420px;margin:80px auto;background:var(--card);padding:30px;border-radius:12px;box-shadow:var(--shadow)}
.auth-title{text-align:center;font-size:22px;color:var(--blue);margin-bottom:25px;font-weight:bold}
.tab-group{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{flex:1;text-align:center;padding:12px 0;color:var(--gray);cursor:pointer;transition:all 0.2s}
.tab.active{color:var(--blue);border-bottom:2px solid var(--blue);font-weight:500}
.input-row{margin-bottom:16px;position:relative}
.eye-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray)}
.link{color:var(--blue);cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.text-center{text-align:center;margin-top:15px;font-size:13px;color:var(--gray)}
</style>
</head>
<body>
<!-- 登录注册页面 -->
<div class="auth-container" id="authPage">
  <div class="auth-title">PPT接单管理系统</div>
  <div class="tab-group">
    <div class="tab active" onclick="switchTab('login')">登录</div>
    <div class="tab" onclick="switchTab('register')">注册</div>
  </div>

  <!-- 登录表单 -->
  <div id="loginForm">
    <div class="input-row">
      <input type="text" id="loginUser" placeholder="请输入用户名" required>
    </div>
    <div class="input-row">
      <input type="password" id="loginPwd" placeholder="请输入密码" required>
      <span class="eye-icon" onclick="togglePwd('loginPwd')">👁️</span>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="login()">立即登录</button>
    <div class="text-center">
      忘记密码？<span class="link" onclick="openModal('findPwdModal')">点击找回</span>
    </div>
    <div class="text-center" style="margin-top:8px">
      管理员默认账号：admin / 123456
    </div>
  </div>

  <!-- 注册表单 -->
  <div id="registerForm" style="display:none">
    <div class="input-row">
      <input type="text" id="regUser" placeholder="设置用户名" required>
    </div>
    <div class="input-row">
      <input type="password" id="regPwd" placeholder="设置密码（≥6位）" required>
      <span class="eye-icon" onclick="togglePwd('regPwd')">👁️</span>
    </div>
    <div class="input-row">
      <select id="regSafeQ" required>
        <option value="">请选择密保问题</option>
        <option value="school">你的母校名称？</option>
        <option value="pet">第一只宠物名字？</option>
        <option value="phone">常用手机号后4位？</option>
        <option value="color">你最喜欢的颜色？</option>
        <option value="food">你最喜欢的食物？</option>
      </select>
    </div>
    <div class="input-row">
      <input type="text" id="regSafeA" placeholder="请输入密保答案" required>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="register()">完成注册</button>
    <div class="text-center">
      注册后默认为：设计师权限
    </div>
  </div>
</div>

<!-- 系统主页面 -->
<div id="mainPage" style="display:none">
  <!-- 顶部导航 -->
  <div class="top-bar">
    <div class="user-info">
      <span class="role-tag" id="roleTag">设计师</span>
      <span id="userName">用户名</span>
    </div>
    <div class="action-buttons">
      <button class="btn btn-default" onclick="toggleTheme()">🌙 切换主题</button>
      <button class="btn btn-primary" id="channelManageBtn" style="display:none" onclick="openModal('channelModal')">📋 渠道管理</button>
      <button class="btn btn-primary" id="roleManageBtn" style="display:none" onclick="openModal('roleModal')">🔑 权限管理</button>
      <button class="btn btn-danger" onclick="logout()">🚪 退出登录</button>
    </div>
  </div>

  <!-- 数据统计看板 -->
  <div class="card">
    <div class="card-header">📊 数据统计看板</div>
    <div class="stats-grid">
      <div class="stat-card" onclick="filterOrder('all')">
        <div class="icon">📦</div>
        <div class="stat-title">总订单数</div>
        <div class="stat-value" id="totalOrder">0</div>
      </div>
      <div class="stat-card" onclick="filterOrder('all')">
        <div class="icon">💰</div>
        <div class="stat-title">总金额（元）</div>
        <div class="stat-value" id="totalMoney">¥0.00</div>
      </div>
      <div class="stat-card" onclick="filterOrder('已结算')">
        <div class="icon">💵</div>
        <div class="stat-title">已结算金额（元）</div>
        <div class="stat-value" id="settledMoney">¥0.00</div>
      </div>
      <div class="stat-card" onclick="filterOrder('today')">
        <div class="icon">📅</div>
        <div class="stat-title">今日接单</div>
        <div class="stat-value" id="todayOrder">0</div>
      </div>
      <div class="stat-card" onclick="filterOrder('month')">
        <div class="icon">📈</div>
        <div class="stat-title">本月订单</div>
        <div class="stat-value" id="monthOrder">0</div>
      </div>
      <div class="stat-card">
        <div class="icon">👥</div>
        <div class="stat-title">设计师人数</div>
        <div class="stat-value" id="designerCount">0</div>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-card">
        <canvas id="orderTrendChart"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="designerEarningsChart"></canvas>
      </div>
    </div>
  </div>

  <!-- 订单录入 -->
  <div class="card">
    <div class="card-header">📝 订单录入</div>
    <div class="form-grid">
      <div class="form-item">
        <label>客户群昵称 *</label>
        <input type="text" id="customerName" placeholder="请输入客户群昵称" required>
      </div>
      <div class="form-item">
        <label>PPT页数 *</label>
        <input type="number" id="pptPages" min="1" placeholder="请输入PPT页数" required>
      </div>
      <div class="form-item">
        <label>订单价格（原价）*</label>
        <input type="number" id="orderPrice" min="0" step="0.01" placeholder="请输入订单原价" required>
      </div>
      <div class="form-item">
        <label>接单时间 *</label>
        <input type="datetime-local" id="receiveTime" required>
      </div>
      <div class="form-item">
        <label>期待交付时间 *</label>
        <input type="datetime-local" id="expectDeliveryTime" required>
      </div>
      <div class="form-item">
        <label>渠道 *</label>
        <input type="text" id="channelInput" placeholder="输入渠道或选择下方标签" required>
        <div class="channel-tags" id="channelTags">
          <!-- 渠道标签动态生成 -->
        </div>
      </div>
      <div class="form-item">
        <label>订单状态 *</label>
        <select id="orderStatus" required>
          <option value="待做">待做</option>
          <option value="进行中">进行中</option>
          <option value="已交付">已交付</option>
          <option value="已结算">已结算</option>
          <option value="申请结算中">申请结算中</option>
          <option value="需异常核对">需异常核对</option>
          <option value="退单转单">退单转单</option>
        </select>
      </div>
      <div class="form-item">
        <label>设计师 *</label>
        <input type="text" id="designerName" placeholder="请输入设计师姓名" required>
      </div>
      <div class="form-item">
        <label>团战队员</label>
        <input type="text" id="teamMembers" placeholder="多人用逗号分隔，单人可不填">
      </div>
    </div>
    <div class="form-item">
      <label>备注</label>
      <textarea id="orderRemark" placeholder="请输入备注信息（如特殊要求、结算说明等）"></textarea>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-success" onclick="saveOrder()">💾 保存订单</button>
      <button class="btn btn-default" onclick="clearOrderForm()">🗑️ 清空表单</button>
      <button class="btn btn-primary" onclick="exportAllOrders()">📤 导出所有订单</button>
    </div>
  </div>

  <!-- 订单列表 -->
  <div class="card">
    <div class="card-header">📋 订单列表</div>
    <div class="search-filter">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="orderSearch" placeholder="搜索客户、设计师、渠道...">
      </div>
      <div class="filter-select">
        <select id="statusFilter" onchange="filterOrderByStatus()">
          <option value="all">所有状态</option>
          <option value="待做">待做</option>
          <option value="进行中">进行中</option>
          <option value="已交付">已交付</option>
          <option value="已结算">已结算</option>
          <option value="申请结算中">申请结算中</option>
          <option value="需异常核对">需异常核对</option>
          <option value="退单转单">退单转单</option>
        </select>
      </div>
      <div class="filter-select">
        <select id="sortFilter" onchange="sortOrders()">
          <option value="latest">最新接单</option>
          <option value="earliest">最早接单</option>
          <option value="price-high">价格从高到低</option>
          <option value="price-low">价格从低到高</option>
        </select>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>客户昵称</th>
            <th>页数</th>
            <th>价格（元）</th>
            <th>接单时间</th>
            <th>渠道</th>
            <th>状态</th>
            <th>设计师</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="orderTableBody">
          <!-- 订单数据动态生成 -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 渠道管理弹窗 -->
<div class="modal-backdrop" id="channelModal">
  <div class="modal">
    <div class="modal-header">
      渠道管理
      <button class="modal-close" onclick="closeModal('channelModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-item">
        <label>渠道名称 *</label>
        <input type="text" id="newChannelName" placeholder="请输入渠道名称">
      </div>
      <div class="form-item">
        <label>分成比例（0-1）*</label>
        <input type="number" id="newChannelRate" min="0" max="1" step="0.01" placeholder="如0.4表示40%">
      </div>
    </div>
    <button class="btn btn-success" onclick="addChannel()" style="margin-bottom:16px">➕ 添加渠道</button>
    <div id="channelList" style="max-height:300px;overflow-y:auto">
      <!-- 渠道列表动态生成 -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('channelModal')">关闭</button>
    </div>
  </div>
</div>

<!-- 权限管理弹窗 -->
<div class="modal-backdrop" id="roleModal">
  <div class="modal">
    <div class="modal-header">
      权限管理
      <button class="modal-close" onclick="closeModal('roleModal')">×</button>
    </div>
    <div class="form-item">
      <label>用户名 *</label>
      <input type="text" id="targetUserName" placeholder="请输入已注册的用户名">
    </div>
    <div class="form-item">
      <label>授予角色 *</label>
      <select id="targetRole">
        <option value="sub">二级管理员</option>
        <option value="designer">设计师</option>
      </select>
    </div>
    <button class="btn btn-success" onclick="grantRole()">✅ 授予权限</button>
    <div id="userRoleList" style="margin-top:20px;max-height:300px;overflow-y:auto">
      <!-- 用户角色列表动态生成 -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('roleModal')">关闭</button>
    </div>
  </div>
</div>

<!-- 找回密码弹窗 -->
<div class="modal-backdrop" id="findPwdModal">
  <div class="modal">
    <div class="modal-header">
      找回密码
      <button class="modal-close" onclick="closeModal('findPwdModal')">×</button>
    </div>
    <div class="input-row">
      <input type="text" id="findPwdUser" placeholder="请输入用户名" required>
    </div>
    <div class="input-row">
      <select id="findPwdSafeQ" required>
        <option value="">请选择密保问题</option>
        <option value="school">你的母校名称？</option>
        <option value="pet">第一只宠物名字？</option>
        <option value="phone">常用手机号后4位？</option>
        <option value="color">你最喜欢的颜色？</option>
        <option value="food">你最喜欢的食物？</option>
      </select>
    </div>
    <div class="input-row">
      <input type="text" id="findPwdSafeA" placeholder="请输入密保答案" required>
    </div>
    <div class="input-row">
      <input type="password" id="newPwd" placeholder="请设置新密码（≥6位）" required>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('findPwdModal')">取消</button>
      <button class="btn btn-primary" onclick="resetPassword()">确认重置</button>
    </div>
  </div>
</div>

<!-- 编辑订单弹窗 -->
<div class="modal-backdrop" id="editOrderModal">
  <div class="modal">
    <div class="modal-header">
      编辑订单
      <button class="modal-close" onclick="closeModal('editOrderModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-item">
        <label>客户群昵称 *</label>
        <input type="text" id="editCustomerName" required>
      </div>
      <div class="form-item">
        <label>PPT页数 *</label>
        <input type="number" id="editPptPages" min="1" required>
      </div>
      <div class="form-item">
        <label>订单价格（原价）*</label>
        <input type="number" id="editOrderPrice" min="0" step="0.01" required>
      </div>
      <div class="form-item">
        <label>接单时间 *</label>
        <input type="datetime-local" id="editReceiveTime" required>
      </div>
      <div class="form-item">
        <label>期待交付时间 *</label>
        <input type="datetime-local" id="editExpectDeliveryTime" required>
      </div>
      <div class="form-item">
        <label>渠道 *</label>
        <input type="text" id="editChannelInput" required>
      </div>
      <div class="form-item">
        <label>订单状态 *</label>
        <select id="editOrderStatus" required>
          <option value="待做">待做</option>
          <option value="进行中">进行中</option>
          <option value="已交付">已交付</option>
          <option value="已结算">已结算</option>
          <option value="申请结算中">申请结算中</option>
          <option value="需异常核对">需异常核对</option>
          <option value="退单转单">退单转单</option>
        </select>
      </div>
      <div class="form-item">
        <label>设计师 *</label>
        <input type="text" id="editDesignerName" required>
      </div>
      <div class="form-item">
        <label>团战队员</label>
        <input type="text" id="editTeamMembers">
      </div>
    </div>
    <div class="form-item">
      <label>备注</label>
      <textarea id="editOrderRemark"></textarea>
    </div>
    <input type="hidden" id="editOrderId">
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('editOrderModal')">取消</button>
      <button class="btn btn-primary" onclick="updateOrder()">保存修改</button>
    </div>
  </div>
</div>

<!-- 提示框 -->
<div class="toast" id="toast"></div>

<script>
// ===== 核心配置 =====
const ADMIN_ACCOUNT = "admin";
const DEFAULT_ADMIN_PWD = "123456";
const STORAGE_KEYS = {
  USERS: "ppt_system_users",
  CHANNELS: "ppt_system_channels",
  ORDERS: "ppt_system_orders",
  ROLES: "ppt_system_roles",
  THEME: "ppt_system_theme",
  CURRENT_USER: "ppt_system_current_user"
};

// ===== 存储工具 =====
const Storage = {
  get(key, defaultValue = []) {
    try {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    } catch (e) {
      showToast("数据读取失败，请刷新页面重试");
      return defaultValue;
    }
  },
  set(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify(data));
      return true;
    } catch (e) {
      showToast("数据保存失败，请清理浏览器缓存");
      return false;
    }
  }
};

// ===== 应用状态 =====
const AppState = {
  currentUser: "",
  currentRole: "", // super, sub, designer
  users: Storage.get(STORAGE_KEYS.USERS),
  channels: Storage.get(STORAGE_KEYS.CHANNELS, [
    { name: "闲鱼", rate: 0.4 },
    { name: "淘宝", rate: 0.35 },
    { name: "微信", rate: 0.5 },
    { name: "老客户", rate: 0.6 },
    { name: "其他", rate: 0.4 }
  ]),
  orders: Storage.get(STORAGE_KEYS.ORDERS),
  roles: Storage.get(STORAGE_KEYS.ROLES, { [ADMIN_ACCOUNT]: "super" }),
  charts: { orderTrend: null, designerEarnings: null }
};

// ===== 初始化 =====
function init() {
  // 初始化管理员账号
  initAdminAccount();
  // 检查登录状态
  checkLoginStatus();
  // 初始化主题
  initTheme();
  // 初始化图表
  setTimeout(initCharts, 300);
}

// 初始化管理员账号
function initAdminAccount() {
  const hasAdmin = AppState.users.some(user => user.username === ADMIN_ACCOUNT);
  if (!hasAdmin) {
    AppState.users.push({
      username: ADMIN_ACCOUNT,
      password: DEFAULT_ADMIN_PWD,
      safeQ: "school",
      safeA: "admin"
    });
    Storage.set(STORAGE_KEYS.USERS, AppState.users);
  }
}

// 检查登录状态
function checkLoginStatus() {
  const currentUserName = Storage.get(STORAGE_KEYS.CURRENT_USER);
  if (currentUserName) {
    const user = AppState.users.find(u => u.username === currentUserName);
    if (user) {
      AppState.currentUser = currentUserName;
      AppState.currentRole = AppState.roles[currentUserName] || "designer";
      showMainPage();
    } else {
      Storage.set(STORAGE_KEYS.CURRENT_USER, "");
      showAuthPage();
    }
  } else {
    showAuthPage();
  }
}

// 初始化主题
function initTheme() {
  const theme = Storage.get(STORAGE_KEYS.THEME, "light");
  if (theme === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
    document.querySelector(".btn-default[onclick='toggleTheme()']").innerHTML = "☀️ 切换浅色";
  }
}

// 初始化图表
function initCharts() {
  initOrderTrendChart();
  initDesignerEarningsChart();
  updateStats();
}

// 初始化订单趋势图表
function initOrderTrendChart() {
  const ctx = document.getElementById("orderTrendChart").getContext("2d");
  const dates = getRecentDates(7);
  const orderCounts = dates.map(date => {
    return AppState.orders.filter(order => {
      const orderDate = new Date(order.receiveTime).toLocaleDateString();
      return orderDate === date;
    }).length;
  });

  AppState.charts.orderTrend = new Chart(ctx, {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: "每日订单数",
        data: orderCounts,
        borderColor: '#277ef0',
        backgroundColor: "rgba(39, 126, 240, 0.1)",
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });
}

// 初始化设计师收益图表
function initDesignerEarningsChart() {
  const ctx = document.getElementById("designerEarningsChart").getContext("2d");
  const designerEarnings = {};
  
  // 计算每个设计师的总收益
  AppState.orders.forEach(order => {
    const designer = order.designerName;
    if (!designerEarnings[designer]) {
      designerEarnings[designer] = 0;
    }
    const channel = AppState.channels.find(c => c.name === order.channel) || { rate: 0.4 };
    const earnings = order.orderPrice * channel.rate;
    designerEarnings[designer] += earnings;
  });

  AppState.charts.designerEarnings = new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(designerEarnings),
      datasets: [{
        label: "设计师总收益（元）",
        data: Object.values(designerEarnings).map(v => v.toFixed(2)),
        backgroundColor: "rgba(159, 122, 234, 0.7)",
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

// ===== 页面切换 =====
function showAuthPage() {
  document.getElementById("authPage").style.display = "block";
  document.getElementById("mainPage").style.display = "none";
}

function showMainPage() {
  document.getElementById("authPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  // 设置用户信息
  document.getElementById("userName").textContent = AppState.currentUser;
  setRoleTag();
  // 加载渠道标签
  renderChannelTags();
  // 加载渠道列表
  renderChannelList();
  // 加载用户角色列表
  renderUserRoleList();
  // 加载订单列表
  renderOrderList();
  // 初始化接单时间为当前时间
  document.getElementById("receiveTime").value = new Date().toISOString().slice(0, 16);
  // 填充设计师默认值为当前用户
  document.getElementById("designerName").value = AppState.currentUser;
}

// 设置角色标签
function setRoleTag() {
  const roleTag = document.getElementById("roleTag");
  const channelManageBtn = document.getElementById("channelManageBtn");
  const roleManageBtn = document.getElementById("roleManageBtn");

  switch (AppState.currentRole) {
    case "super":
      roleTag.className = "role-tag role-super";
      roleTag.textContent = "超级管理员";
      channelManageBtn.style.display = "inline-flex";
      roleManageBtn.style.display = "inline-flex";
      break;
    case "sub":
      roleTag.className = "role-tag role-sub";
      roleTag.textContent = "二级管理员";
      channelManageBtn.style.display = "none";
      roleManageBtn.style.display = "none";
      break;
    default:
      roleTag.className = "role-tag role-design";
      roleTag.textContent = "设计师";
      channelManageBtn.style.display = "none";
      roleManageBtn.style.display = "none";
      break;
  }
}

// ===== 登录注册相关 =====
function switchTab(type) {
  const loginForm = document.getElementById("loginForm");
  const registerForm = document.getElementById("registerForm");
  const tabs = document.querySelectorAll(".tab");

  if (type === "login") {
    loginForm.style.display = "block";
    registerForm.style.display = "none";
    tabs[0].classList.add("active");
    tabs[1].classList.remove("active");
  } else {
    loginForm.style.display = "none";
    registerForm.style.display = "block";
    tabs[0].classList.remove("active");
    tabs[1].classList.add("active");
  }
}

function togglePwd(id) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

function login() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPwd").value.trim();

  if (!username || !password) {
    showToast("请填写完整账号密码");
    return;
  }

  const user = AppState.users.find(u => u.username === username && u.password === password);
  if (user) {
    AppState.currentUser = username;
    AppState.currentRole = AppState.roles[username] || "designer";
    Storage.set(STORAGE_KEYS.CURRENT_USER, username);
    showMainPage();
    showToast("登录成功！");
  } else {
    showToast("账号或密码错误");
  }
}

function register() {
  const username = document.getElementById("regUser").value.trim();
  const password = document.getElementById("regPwd").value.trim();
  const safeQ = document.getElementById("regSafeQ").value;
  const safeA = document.getElementById("regSafeA").value.trim();

  if (!username || !password || !safeQ || !safeA) {
    showToast("请填写完整注册信息");
    return;
  }

  if (password.length < 6) {
    showToast("密码长度不少于6位");
    return;
  }

  if (AppState.users.some(u => u.username === username)) {
    showToast("用户名已存在");
    return;
  }

  // 添加新用户
  AppState.users.push({ username, password, safeQ, safeA });
  Storage.set(STORAGE_KEYS.USERS, AppState.users);
  // 默认角色为设计师
  AppState.roles[username] = "designer";
  Storage.set(STORAGE_KEYS.ROLES, AppState.roles);

  showToast("注册成功！请登录");
  switchTab("login");
}

function resetPassword() {
  const username = document.getElementById("findPwdUser").value.trim();
  const safeQ = document.getElementById("findPwdSafeQ").value;
  const safeA = document.getElementById("findPwdSafeA").value.trim();
  const newPwd = document.getElementById("newPwd").value.trim();

  if (!username || !safeQ || !safeA || !newPwd) {
    showToast("请填写完整信息");
    return;
  }

  if (newPwd.length < 6) {
    showToast("新密码长度不少于6位");
    return;
  }

  const userIndex = AppState.users.findIndex(u => u.username === username);
  if (userIndex === -1) {
    showToast("用户不存在");
    return;
  }

  const user = AppState.users[userIndex];
  if (user.safeQ !== safeQ || user.safeA !== safeA) {
    showToast("密保信息错误");
    return;
  }

  // 更新密码
  AppState.users[userIndex].password = newPwd;
  Storage.set(STORAGE_KEYS.USERS, AppState.users);

  showToast("密码重置成功！");
  closeModal("findPwdModal");
  switchTab("login");
}

function logout() {
  if (confirm("确定要退出登录吗？")) {
    Storage.set(STORAGE_KEYS.CURRENT_USER, "");
    location.reload();
  }
}

// ===== 渠道管理 =====
function renderChannelTags() {
  const channelTags = document.getElementById("channelTags");
  channelTags.innerHTML = "";

  AppState.channels.forEach(channel => {
    const tag = document.createElement("div");
    tag.className = "channel-tag";
    tag.textContent = channel.name;
    tag.onclick = () => {
      document.getElementById("channelInput").value = channel.name;
    };
    channelTags.appendChild(tag);
  });
}

function renderChannelList() {
  const channelList = document.getElementById("channelList");
  channelList.innerHTML = "";

  AppState.channels.forEach((channel, index) => {
    const channelItem = document.createElement("div");
    channelItem.style.display = "flex";
    channelItem.style.justifyContent = "space-between";
    channelItem.style.alignItems = "center";
    channelItem.style.padding = "10px 0";
    channelItem.style.borderBottom = "1px solid var(--border)";
    channelItem.innerHTML = `
      <div>
        <span style="font-weight:600">${channel.name}</span>
        <span style="margin-left:10px;color:var(--gray)">分成：${(channel.rate * 100).toFixed(0)}%</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="padding:6px 12px;font-size:12px" onclick="editChannel(${index})">编辑</button>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteChannel(${index})">删除</button>
      </div>
    `;
    channelList.appendChild(channelItem);
  });
}

function addChannel() {
  const name = document.getElementById("newChannelName").value.trim();
  const rate = parseFloat(document.getElementById("newChannelRate").value);

  if (!name || isNaN(rate) || rate < 0 || rate > 1) {
    showToast("请填写有效的渠道名称和分成比例");
    return;
  }

  if (AppState.channels.some(c => c.name === name)) {
    showToast("渠道已存在");
    return;
  }

  AppState.channels.push({ name, rate });
  Storage.set(STORAGE_KEYS.CHANNELS, AppState.channels);

  renderChannelTags();
  renderChannelList();
  document.getElementById("newChannelName").value = "";
  document.getElementById("newChannelRate").value = "";
  showToast("渠道添加成功");
}

function editChannel(index) {
  const channel = AppState.channels[index];
  const newName = prompt("请输入新的渠道名称", channel.name);
  if (!newName) return;

  const newRate = parseFloat(prompt("请输入新的分成比例（0-1）", channel.rate));
  if (isNaN(newRate) || newRate < 0 || newRate > 1) {
    showToast("分成比例无效");
    return;
  }

  AppState.channels[index] = { name: newName, rate: newRate };
  Storage.set(STORAGE_KEYS.CHANNELS, AppState.channels);

  renderChannelTags();
  renderChannelList();
  showToast("渠道编辑成功");
}

function deleteChannel(index) {
  if (confirm("确定要删除该渠道吗？")) {
    AppState.channels.splice(index, 1);
    Storage.set(STORAGE_KEYS.CHANNELS, AppState.channels);

    renderChannelTags();
    renderChannelList();
    showToast("渠道删除成功");
  }
}

// ===== 权限管理 =====
function renderUserRoleList() {
  const userRoleList = document.getElementById("userRoleList");
  userRoleList.innerHTML = "";

  AppState.users.forEach(user => {
    const role = AppState.roles[user.username] || "designer";
    const roleText = role === "super" ? "超级管理员" : role === "sub" ? "二级管理员" : "设计师";
    const roleColor = role === "super" ? "#f53f3f" : role === "sub" ? "#ff7d00" : "#00b42a";

    const userItem = document.createElement("div");
    userItem.style.display = "flex";
    userItem.style.justifyContent = "space-between";
    userItem.style.alignItems = "center";
    userItem.style.padding = "8px 0";
    userItem.style.borderBottom = "1px solid var(--border)";
    userItem.innerHTML = `
      <div>用户名：${user.username}</div>
      <div style="color:${roleColor};font-weight:600">${roleText}</div>
    `;
    userRoleList.appendChild(userItem);
  });
}

function grantRole() {
  const username = document.getElementById("targetUserName").value.trim();
  const role = document.getElementById("targetRole").value;

  if (!username) {
    showToast("请输入用户名");
    return;
  }

  if (!AppState.users.some(u => u.username === username)) {
    showToast("用户不存在");
    return;
  }

  if (username === ADMIN_ACCOUNT) {
    showToast("无法修改超级管理员角色");
    return;
  }

  AppState.roles[username] = role;
  Storage.set(STORAGE_KEYS.ROLES, AppState.roles);

  renderUserRoleList();
  document.getElementById("targetUserName").value = "";
  showToast("权限授予成功");
}

// ===== 订单管理 =====
function saveOrder() {
  const customerName = document.getElementById("customerName").value.trim();
  const pptPages = document.getElementById("pptPages").value;
  const orderPrice = document.getElementById("orderPrice").value;
  const receiveTime = document.getElementById("receiveTime").value;
  const expectDeliveryTime = document.getElementById("expectDeliveryTime").value;
  const channel = document.getElementById("channelInput").value.trim();
  const orderStatus = document.getElementById("orderStatus").value;
  const designerName = document.getElementById("designerName").value.trim();
  const teamMembers = document.getElementById("teamMembers").value.trim();
  const orderRemark = document.getElementById("orderRemark").value.trim();

  // 校验必填项
  if (!customerName || !pptPages || !orderPrice || !receiveTime || !expectDeliveryTime || !channel || !designerName) {
    showToast("带*的为必填项，请填写完整");
    return;
  }

  // 创建订单
  const newOrder = {
    id: Date.now().toString(),
    customerName,
    pptPages: parseInt(pptPages),
    orderPrice: parseFloat(orderPrice),
    receiveTime,
    expectDeliveryTime,
    channel,
    orderStatus,
    designerName,
    teamMembers,
    orderRemark,
    createTime: new Date().toISOString()
  };

  // 添加订单
  AppState.orders.unshift(newOrder);
  Storage.set(STORAGE_KEYS.ORDERS, AppState.orders);

  // 刷新订单列表和统计
  renderOrderList();
  updateStats();
  clearOrderForm();
  showToast("订单保存成功");
}

function renderOrderList() {
  const tableBody = document.getElementById("orderTableBody");
  tableBody.innerHTML = "";

  // 按权限筛选订单
  let filteredOrders = [...AppState.orders];
  if (AppState.currentRole === "designer") {
    filteredOrders = filteredOrders.filter(order => order.designerName === AppState.currentUser);
  }

  // 按搜索筛选
  const searchKeyword = document.getElementById("orderSearch").value.trim().toLowerCase();
  if (searchKeyword) {
    filteredOrders = filteredOrders.filter(order => {
      return order.customerName.toLowerCase().includes(searchKeyword) ||
             order.designerName.toLowerCase().includes(searchKeyword) ||
             order.channel.toLowerCase().includes(searchKeyword) ||
             order.orderRemark.toLowerCase().includes(searchKeyword);
    });
  }

  // 按状态筛选
  const statusFilter = document.getElementById("statusFilter").value;
  if (statusFilter !== "all") {
    filteredOrders = filteredOrders.filter(order => order.orderStatus === statusFilter);
  }

  // 排序
  sortOrders(filteredOrders);

  if (filteredOrders.length === 0) {
    const emptyRow = document.createElement("tr");
    emptyRow.innerHTML = `<td colspan="8" style="padding:40px;color:var(--gray)">暂无符合条件的订单</td>`;
    tableBody.appendChild(emptyRow);
    return;
  }

  filteredOrders.forEach(order => {
    const statusClass = getStatusClass(order.orderStatus);
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${order.customerName}</td>
      <td>${order.pptPages}页</td>
      <td>¥${order.orderPrice.toFixed(2)}</td>
      <td>${formatDateTime(order.receiveTime)}</td>
      <td>${order.channel}</td>
      <td><span class="status-badge ${statusClass}">${order.orderStatus}</span></td>
      <td>${order.designerName}</td>
      <td>
        <button class="btn btn-primary" style="padding:6px 10px;font-size:12px" onclick="openEditOrderModal('${order.id}')">编辑</button>
        <button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="deleteOrder('${order.id}')">删除</button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

function openEditOrderModal(orderId) {
  const order = AppState.orders.find(o => o.id === orderId);
  if (!order) return;

  // 填充表单
  document.getElementById("editCustomerName").value = order.customerName;
  document.getElementById("editPptPages").value = order.pptPages;
  document.getElementById("editOrderPrice").value = order.orderPrice;
  document.getElementById("editReceiveTime").value = order.receiveTime;
  document.getElementById("editExpectDeliveryTime").value = order.expectDeliveryTime;
  document.getElementById("editChannelInput").value = order.channel;
  document.getElementById("editOrderStatus").value = order.orderStatus;
  document.getElementById("editDesignerName").value = order.designerName;
  document.getElementById("editTeamMembers").value = order.teamMembers;
  document.getElementById("editOrderRemark").value = order.orderRemark;
  document.getElementById("editOrderId").value = order.id;

  openModal("editOrderModal");
}

function updateOrder() {
  const orderId = document.getElementById("editOrderId").value;
  const orderIndex = AppState.orders.findIndex(o => o.id === orderId);
  if (orderIndex === -1) return;

  const customerName = document.getElementById("editCustomerName").value.trim();
  const pptPages = document.getElementById("editPptPages").value;
  const orderPrice = document.getElementById("editOrderPrice").value;
  const receiveTime = document.getElementById("editReceiveTime").value;
  const expectDeliveryTime = document.getElementById("editExpectDeliveryTime").value;
  const channel = document.getElementById("editChannelInput").value.trim();
  const orderStatus = document.getElementById("editOrderStatus").value;
  const designerName = document.getElementById("editDesignerName").value.trim();
  const teamMembers = document.getElementById("editTeamMembers").value.trim();
  const orderRemark = document.getElementById("editOrderRemark").value.trim();

  if (!customerName || !pptPages || !orderPrice || !receiveTime || !expectDeliveryTime || !channel || !designerName) {
    showToast("带*的为必填项，请填写完整");
    return;
  }

  // 更新订单
  AppState.orders[orderIndex] = {
    ...AppState.orders[orderIndex],
    customerName,
    pptPages: parseInt(pptPages),
    orderPrice: parseFloat(orderPrice),
    receiveTime,
    expectDeliveryTime,
    channel,
    orderStatus,
    designerName,
    teamMembers,
    orderRemark
  };

  Storage.set(STORAGE_KEYS.ORDERS, AppState.orders);

  closeModal("editOrderModal");
  renderOrderList();
  updateStats();
  showToast("订单修改成功");
}

function deleteOrder(orderId) {
  if (confirm("确定要删除该订单吗？删除后无法恢复")) {
    AppState.orders = AppState.orders.filter(o => o.id !== orderId);
    Storage.set(STORAGE_KEYS.ORDERS, AppState.orders);

    renderOrderList();
    updateStats();
    showToast("订单删除成功");
  }
}

function clearOrderForm() {
  document.getElementById("customerName").value = "";
  document.getElementById("pptPages").value = "";
  document.getElementById("orderPrice").value = "";
  document.getElementById("receiveTime").value = new Date().toISOString().slice(0, 16);
  document.getElementById("expectDeliveryTime").value = "";
  document.getElementById("channelInput").value = "";
  document.getElementById("orderStatus").value = "待做";
  document.getElementById("teamMembers").value = "";
  document.getElementById("orderRemark").value = "";
}

function filterOrderByStatus() {
  renderOrderList();
}

function sortOrders(orders = null) {
  const sortType = document.getElementById("sortFilter").value;
  const targetOrders = orders || AppState.orders;

  switch (sortType) {
    case "latest":
      targetOrders.sort((a, b) => new Date(b.receiveTime) - new Date(a.receiveTime));
      break;
    case "earliest":
      targetOrders.sort((a, b) => new Date(a.receiveTime) - new Date(b.receiveTime));
      break;
    case "price-high":
      targetOrders.sort((a, b) => b.orderPrice - a.orderPrice);
      break;
    case "price-low":
      targetOrders.sort((a, b) => a.orderPrice - b.orderPrice);
      break;
  }

  if (!orders) {
    renderOrderList();
  }
}

function filterOrder(type) {
  const statusFilter = document.getElementById("statusFilter");
  const orderSearch = document.getElementById("orderSearch");

  switch (type) {
    case "all":
      statusFilter.value = "all";
      orderSearch.value = "";
      break;
    case "已结算":
      statusFilter.value = "已结算";
      orderSearch.value = "";
      break;
    case "today":
      statusFilter.value = "all";
      const today = new Date().toLocaleDateString();
      orderSearch.value = today;
      break;
    case "month":
      statusFilter.value = "all";
      const month = new Date().getMonth() + 1;
      orderSearch.value = month + "月";
      break;
  }

  renderOrderList();
}

// ===== 统计更新 =====
function updateStats() {
  // 总订单数
  let totalOrder = AppState.orders.length;
  // 总金额
  let totalMoney = AppState.orders.reduce((sum, order) => sum + order.orderPrice, 0);
  // 已结算金额
  let settledMoney = AppState.orders
    .filter(order => order.orderStatus === "已结算")
    .reduce((sum, order) => {
      const channel = AppState.channels.find(c => c.name === order.channel) || { rate: 0.4 };
      return sum + (order.orderPrice * channel.rate);
    }, 0);
  // 今日接单
  const today = new Date().toLocaleDateString();
  let todayOrder = AppState.orders.filter(order => {
    return new Date(order.receiveTime).toLocaleDateString() === today;
  }).length;
  // 本月订单
  const currentMonth = new Date().getMonth();
  let monthOrder = AppState.orders.filter(order => {
    return new Date(order.receiveTime).getMonth() === currentMonth;
  }).length;
  // 设计师人数
  const designers = new Set(AppState.orders.map(order => order.designerName));
  let designerCount = designers.size;

  // 按权限过滤统计数据
  if (AppState.currentRole === "designer") {
    const myOrders = AppState.orders.filter(order => order.designerName === AppState.currentUser);
    totalOrder = myOrders.length;
    totalMoney = myOrders.reduce((sum, order) => sum + order.orderPrice, 0);
    settledMoney = myOrders
      .filter(order => order.orderStatus === "已结算")
      .reduce((sum, order) => {
        const channel = AppState.channels.find(c => c.name === order.channel) || { rate: 0.4 };
        return sum + (order.orderPrice * channel.rate);
      }, 0);
    todayOrder = myOrders.filter(order => {
      return new Date(order.receiveTime).toLocaleDateString() === today;
    }).length;
    monthOrder = myOrders.filter(order => {
      return new Date(order.receiveTime).getMonth() === currentMonth;
    }).length;
  }

  // 更新统计显示
  document.getElementById("totalOrder").textContent = totalOrder;
  document.getElementById("totalMoney").textContent = `¥${totalMoney.toFixed(2)}`;
  document.getElementById("settledMoney").textContent = `¥${settledMoney.toFixed(2)}`;
  document.getElementById("todayOrder").textContent = todayOrder;
  document.getElementById("monthOrder").textContent = monthOrder;
  document.getElementById("designerCount").textContent = designerCount;

  // 更新图表
  if (AppState.charts.orderTrend) {
    initOrderTrendChart();
  }
  if (AppState.charts.designerEarnings) {
    initDesignerEarningsChart();
  }
}

// ===== 导出订单 =====
function exportAllOrders() {
  const ordersToExport = AppState.currentRole === "designer"
    ? AppState.orders.filter(order => order.designerName === AppState.currentUser)
    : AppState.orders;

  if (ordersToExport.length === 0) {
    showToast("暂无订单可导出");
    return;
  }

  // 格式化订单数据
  const formattedOrders = ordersToExport.map(order => {
    const channel = AppState.channels.find(c => c.name === order.channel) || { rate: 0.4 };
    const earnings = (order.orderPrice * channel.rate).toFixed(2);
    return {
      "客户昵称": order.customerName,
      "PPT页数": order.pptPages + "页",
      "订单价格（元）": order.orderPrice.toFixed(2),
      "接单时间": formatDateTime(order.receiveTime),
      "期待交付时间": formatDateTime(order.expectDeliveryTime),
      "渠道": order.channel,
      "分成比例": (channel.rate * 100) + "%",
      "预计收益（元）": earnings,
      "订单状态": order.orderStatus,
      "设计师": order.designerName,
      "团战队员": order.teamMembers || "无",
      "备注": order.orderRemark || "无"
    };
  });

  const ws = XLSX.utils.json_to_sheet(formattedOrders);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "订单数据");
  XLSX.writeFile(wb, `PPT接单订单_${new Date().toLocaleDateString()}.xlsx`);

  showToast("订单导出成功");
}

// ===== 工具函数 =====
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

function openModal(id) {
  document.getElementById(id).style.display = "flex";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

function toggleTheme() {
  const currentTheme = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
  if (currentTheme === "dark") {
    document.documentElement.removeAttribute("data-theme");
    Storage.set(STORAGE_KEYS.THEME, "light");
    document.querySelector(".btn-default[onclick='toggleTheme()']").innerHTML = "🌙 切换深色";
  } else {
    document.documentElement.setAttribute("data-theme", "dark");
    Storage.set(STORAGE_KEYS.THEME, "dark");
    document.querySelector(".btn-default[onclick='toggleTheme()']").innerHTML = "☀️ 切换浅色";
  }
}

function formatDateTime(datetimeStr) {
  const date = new Date(datetimeStr);
  return date.toLocaleString("zh-CN", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function getStatusClass(status) {
  switch (status) {
    case "待做": return "status-wait";
    case "进行中": return "status-doing";
    case "已交付": return "status-deliver";
    case "已结算": return "status-settle";
    case "申请结算中": return "status-apply";
    case "需异常核对": return "status-abnormal";
    case "退单转单": return "status-transfer";
    default: return "status-wait";
  }
}

function getRecentDates(days) {
  const dates = [];
  for (let i = days - 1; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    dates.push(date.toLocaleDateString());
  }
  return dates;
}

// 搜索订单
document.getElementById("orderSearch").addEventListener("input", renderOrderList);

// 页面加载完成后初始化
window.onload = init;
