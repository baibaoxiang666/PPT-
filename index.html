<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PPT接单系统 可跳转版</title>
<style>
body{background:#f5f7fa;font-family:微软雅黑;padding:20px;}
.login-box{max-width:420px;margin:80px auto;background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
h2{text-align:center;color:#409eff;margin-bottom:30px;}
.item{margin-bottom:20px;}
.item input{width:100%;padding:12px;border:1px #ddd solid;border-radius:6px;font-size:16px;}
.btn{width:100%;padding:13px;background:#409eff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
.tip{margin-top:20px;text-align:center;color:#999;font-size:14px;}
</style>
</head>
<body>

<div class="login-box" id="loginWrap">
  <h2>系统登录</h2>
  <div class="item"><input id="u" placeholder="用户名"></div>
  <div class="item"><input id="p" placeholder="密码" type="password"></div>
  <button class="btn" onclick="doLogin()">立即登录</button>
  <div class="tip">admin / 123456<br>designer1 / 123456</div>
</div>

<script>
const acc = [
  {user:'admin',pwd:'123456',role:'管理员'},
  {user:'designer1',pwd:'123456',role:'设计师'}
];

function doLogin(){
  let u = document.getElementById('u').value.trim();
  let p = document.getElementById('p').value.trim();
  let find = acc.find(x=>x.user===u&&x.pwd===p);

  if(!find){
    alert('账号密码错误！');
    return;
  }

  alert('登录成功，正在进入后台...');
  document.body.innerHTML = `
  <div style="max-width:800px;margin:30px auto;background:#fff;padding:30px;border-radius:12px;">
    <h2>欢迎 ${u}（${find.role}）</h2>
    <div style="margin-top:30px;">
      <div style="margin:15px 0;">
        <label>客户名称</label>
        <input style="width:100%;padding:10px;margin-top:8px;border:1px #ddd solid;border-radius:6px;">
      </div>
      <div style="margin:15px 0;">
        <label>订单备注</label>
        <textarea rows="4" style="width:100%;padding:10px;border:1px #ddd solid;border-radius:6px;"></textarea>
      </div>
      <button style="background:#409eff;color:#fff;border:none;padding:12px 24px;border-radius:6px;">提交订单</button>
    </div>
  </div>
  `;
}
</script>

</body>
</html>
