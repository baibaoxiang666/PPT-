<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <script src="https://qzonestyle.gtimg.cn/qzone/qzactStatics/configSystem/js/cloud/1.6.0/cloud.js"></script>
  <style>
    *{font-family:微软雅黑;margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f7fa}
    .head{background:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px #0000000a}
    .btn{padding:8px 14px;background:#ff4d4f;color:white;border:none;border-radius:6px}
    .card{background:white;margin:20px;padding:20px;border-radius:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
    input{padding:10px;border:1px solid #ddd;border-radius:6px}
    button{padding:10px 16px;background:#409eff;color:white;border:none;border-radius:6px;margin-top:6px}
  </style>
</head>
<body>

<div class="head">
  <h3>管理后台</h3>
  <button class="btn" onclick="logout()">退出</button>
</div>

<div class="card">
  <div class="grid">
    <input placeholder="客户" id="c">
    <input placeholder="页数" id="p">
    <input placeholder="价格" id="pr">
  </div>
  <button onclick="save()">保存订单</button>
</div>

<script src="cloud.js"></script>
<script>
if(!getCurrentUser()) location.href="login.html";

async function save(){
  await db.collection("orders").add({
    data:{
      customer:document.getElementById("c").value,
      page:document.getElementById("p").value,
      price:document.getElementById("pr").value,
      user:getCurrentUser(),
      time:new Date()
    }
  });
  alert("保存成功");
}
</script>
</body>
</html>
