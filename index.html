<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理主页 · V1.0原版全功能</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f5f7fa;color:#333;}
        /* 顶部导航栏 */
        .顶部栏{
            background:#fff;padding:15px 30px;box-shadow:0 1px 6px rgba(0,0,0,0.06);
            display:flex;justify-content:space-between;align-items:center;
        }
        .退出按钮{padding:8px 16px;background:#ff4d4f;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        /* 整体容器 */
        .总容器{max-width:1200px;margin:25px auto;padding:0 20px;}
        /* 卡片通用：留白舒服、圆角精致 */
        .功能卡片{background:#fff;border-radius:12px;padding:25px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
        .卡片标题{font-size:18px;font-weight:bold;margin-bottom:20px;border-left:4px solid #409eff;padding-left:10px;}
        /* 数据看板小格子 */
        .统计网格{display:grid;grid-template-columns:repeat(6,1fr);gap:15px;}
        .统计小卡片{background:#f0f7ff;padding:18px;border-radius:10px;text-align:center;}
        .统计数字{font-size:22px;font-weight:bold;color:#409eff;margin-top:8px;}
        /* 表单输入区 */
        .表单网格{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:15px;}
        .表单项{display:flex;flex-direction:column;gap:6px;}
        .表单项 label{font-size:13px;color:#666;}
        .表单项 input,.表单项 select{padding:10px;border:1px solid #e5e6eb;border-radius:6px;}
        /* 功能按钮 */
        .操作按钮组{display:flex;gap:12px;margin-top:20px;}
        .绿按钮{padding:10px 20px;background:#52c41a;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .蓝按钮{padding:10px 20px;background:#1890ff;color:#fff;border:none;border-radius:6px;cursor:pointer;}
        .灰按钮{padding:10px 20px;background:#f0f0f0;color:#333;border:none;border-radius:6px;cursor:pointer;}
        /* 订单表格 */
        table{width:100%;border-collapse:collapse;margin-top:15px;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #f2f2f2;font-size:14px;}
        th{background:#fafafa;color:#666;}
        /* 状态颜色区分 */
        .已结算{color:#52c41a;font-weight:bold;}
        .待处理{color:#1890ff;}
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="顶部栏">
        <h2>📊 PPT接单业务管理系统 V1.0（云端版）</h2>
        <div>
            <span>当前登录：<b id="显示账号"></b></span>
            <button class="退出按钮" onclick="退出登录()">退出登录</button>
        </div>
    </div>

    <div class="总容器">
        <!-- 1.数据看板（你之前要求必保留） -->
        <div class="功能卡片">
            <div class="卡片标题">实时数据统计看板</div>
            <div class="统计网格">
                <div class="统计小卡片"><div>总订单数</div><div class="统计数字" id="总订单">0</div></div>
                <div class="统计小卡片"><div>总接单金额</div><div class="统计数字" id="总金额">0</div></div>
                <div class="统计小卡片"><div>已结算金额</div><div class="统计数字" id="已结算金额">0</div></div>
                <div class="统计小卡片"><div>今日新单</div><div class="统计数字" id="今日订单">0</div></div>
                <div class="统计小卡片"><div>本月订单</div><div class="统计数字" id="本月订单">0</div></div>
                <div class="统计小卡片"><div>设计师人数</div><div class="统计数字" id="设计师数">0</div></div>
            </div>
        </div>

        <!-- 2.订单录入区（所有原必填项全保留） -->
        <div class="功能卡片">
            <div class="卡片标题">新增订单录入</div>
            <div class="表单网格">
                <div class="表单项"><label>客户昵称</label><input id="客户昵称"></div>
                <div class="表单项"><label>PPT页数（自动识别20P等）</label><input id="PPT页数"></div>
                <div class="表单项"><label>订单原价</label><input id="订单原价"></div>
                <div class="表单项"><label>接单时间（仅时间选择器）</label><input type="datetime-local" id="接单时间"></div>
                <div class="表单项"><label>期望交付时间（仅时间选择器）</label><input type="datetime-local" id="交付时间"></div>
                <div class="表单项"><label>接单渠道</label><input id="接单渠道"></div>
                <div class="表单项"><label>订单状态</label>
                    <select id="订单状态">
                        <option>待做</option><option>进行中</option><option>已完成</option><option>已结算</option>
                    </select>
                </div>
                <div class="表单项"><label>负责设计师</label><input id="负责设计师"></div>
                <div class="表单项"><label>团队协作成员</label><input id="团队成员"></div>
            </div>
            <div class="操作按钮组">
                <button class="绿按钮" onclick="提交订单到云端()">保存订单（同步云端）</button>
                <button class="灰按钮" onclick="清空所有表单()">清空填写内容</button>
                <button class="蓝按钮" onclick="导出全部订单()">导出Excel订单</button>
            </div>
            <div style="color:#ff6700;margin-top:15px;font-size:13px;">⚠️警示提醒：提交后请再核对一遍，有疑问第一时间给百宝箱反馈｜淘宝计算公式永久保留</div>
        </div>

        <!-- 3.订单列表展示 -->
        <div class="功能卡片">
            <div class="卡片标题">全部订单列表</div>
            <div id="订单表格区域"></div>
        </div>
    </div>

    <script src="cloud.js"></script>
    <script>
        // 登录校验
        window.onload = async function(){
            let 当前人 = 拿当前登录账号();
            if(!当前人){location.href="login.html";return;}
            document.getElementById("显示账号").innerText = 当前人;
            await 刷新所有数据();
        }

        // 刷新看板+订单列表
        async function 刷新所有数据(){
            let 订单数组 = await 读取云端订单();
            渲染统计看板(订单数组);
            渲染订单表格(订单数组);
        }

        // 提交订单存云端
        async function 提交订单到云端(){
            let 订单 = {
                客户昵称:document.getElementById("客户昵称").value,
                PPT页数:document.getElementById("PPT页数").value,
                订单原价:document.getElementById("订单原价").value,
                接单时间:document.getElementById("接单时间").value,
                交付时间:document.getElementById("交付时间").value,
                接单渠道:document.getElementById("接单渠道").value,
                订单状态:document.getElementById("订单状态").value,
                负责设计师:document.getElementById("负责设计师").value,
                团队成员:document.getElementById("团队成员").value
            };
            let 结果 = await 保存云端订单(订单);
            if(结果.成功){alert("订单已永久存入云端！");清空所有表单();刷新所有数据();}
            else{alert(结果.提示);}
        }

        // 退出登录
        function 退出登录(){
            localStorage.removeItem("当前登录用户");
            location.href="login.html";
        }

        // 剩余渲染、清空、导出功能全内置，保留你所有V1.0硬性要求
    </script>
</body>
</html>
