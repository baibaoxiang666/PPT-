<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT接单管理系统｜统一权限版</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,system-ui}
body {background:#f5f7fa;color:#333}

/* 登录注册 */
.auth-box {max-width:420px;margin:80px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.auth-title {text-align:center;font-size:22px;color:#1989fa;margin-bottom:25px;font-weight:bold}
.tab-wrap {display:flex;border-bottom:1px solid #eee;margin-bottom:20px}
.tab-item {flex:1;text-align:center;padding:12px 0;color:#666;cursor:pointer}
.tab-item.active {color:#1989fa;border-bottom:2px solid #1989fa}
.input-row {margin-bottom:16px;position:relative}
.input-row input, .input-row select {width:100%;padding:12px 14px;border:1px solid #e5e6eb;border-radius:6px;font-size:14px;background:#fff}
.eye-icon {position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999}
.btn {width:100%;padding:13px;background:#1989fa;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;margin-top:8px}
.tip-text {font-size:13px;color:#999;margin-top:15px;text-align:center}
.find-pwd {color:#1989fa;cursor:pointer}

/* 后台布局 */
.admin-layout {display:none;min-height:100vh}
.top-nav {background:#fff;padding:16px 24px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.user-info {font-size:15px}
.nav-btn {padding:8px 14px;margin-left:10px;border-radius:4px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px}
.nav-btn.exit {color:#f56c6c;border-color:#f56c6c}

.main-content {padding:24px}
.card {background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-title {font-size:16px;font-weight:500;margin-bottom:18px;color:#333;border-left:4px solid #1989fa;padding-left:10px}
.empty-data {text-align:center;padding:60px 0;color:#999;font-size:14px}

/* 弹窗 */
.modal-mask {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
.modal-box {background:#fff;padding:25px;border-radius:10px;width:90%;max-width:380px}
.modal-title {font-size:18px;margin-bottom:20px;text-align:center}
.modal-btn {display:flex;gap:10px;margin-top:20px}
.modal-btn button {flex:1;padding:11px;border-radius:6px;border:none;cursor:pointer}
.btn-confirm {background:#1989fa;color:#fff}
.btn-cancel {background:#eee;color:#333}
</style>
</head>
<body>

<!-- 登录注册 -->
<div class="auth-box" id="authPage">
    <div class="auth-title">接单管理系统</div>
    <div class="tab-wrap">
        <div class="tab-item active" onclick="switchTab('login')">登录</div>
        <div class="tab-item" onclick="switchTab('reg')">注册</div>
    </div>

    <!-- 登录 -->
    <div id="loginForm">
        <div class="input-row"><input type="text" id="loginUser" placeholder="用户名"></div>
        <div class="input-row">
            <input type="password" id="loginPwd" placeholder="密码">
            <span class="eye-icon" onclick="togglePwd('loginPwd')">👁️</span>
        </div>
        <button class="btn" onclick="login()">登录</button>
        <div class="tip-text">忘记密码？<span class="find-pwd" onclick="openModal('findModal')">找回密码</span></div>
        <div class="tip-text">管理员默认：admin / 123456</div>
    </div>

    <!-- 注册（含密保） -->
    <div id="regForm" style="display:none">
        <div class="input-row"><input type="text" id="regUser" placeholder="用户名"></div>
        <div class="input-row">
            <input type="password" id="regPwd" placeholder="密码">
            <span class="eye-icon" onclick="togglePwd('regPwd')">👁️</span>
        </div>
        <div class="input-row">
            <select id="safeQuestion">
                <option value="">请选择密保问题</option>
                <option value="母校">你的母校名称？</option>
                <option value="宠物">第一只宠物名字？</option>
                <option value="手机号">常用手机号后4位？</option>
            </select>
        </div>
        <div class="input-row"><input type="text" id="safeAnswer" placeholder="密保答案"></div>
        <button class="btn" onclick="register()">注册</button>
    </div>
</div>

<!-- 管理员后台（极简） -->
<div class="admin-layout" id="adminPage">
    <div class="top-nav">
        <div class="user-info">欢迎你，<span id="adminName"></span></div>
        <div>
            <button class="nav-btn" onclick="openModal('editPwdModal')">修改密码</button>
            <button class="nav-btn exit" onclick="logout()">退出登录</button>
        </div>
    </div>
    <div class="main-content">
        <div class="card">
            <div class="card-title">接单记录台账</div>
            <div class="empty-data">暂无订单数据</div>
        </div>
    </div>
</div>

<!-- 找回密码弹窗 -->
<div class="modal-mask" id="findModal">
    <div class="modal-box">
        <div class="modal-title">找回密码</div>
        <div class="input-row"><input type="text" id="findUser" placeholder="用户名"></div>
        <div class="input-row"><input type="text" id="findAnswer" placeholder="密保答案"></div>
        <div class="input-row"><input type="password" id="newFindPwd" placeholder="新密码"></div>
        <div class="modal-btn">
            <button class="btn-cancel" onclick="closeModal('findModal')">取消</button>
            <button class="btn-confirm" onclick="resetPwd()">重置</button>
        </div>
    </div>
</div>

<!-- 修改密码弹窗 -->
<div class="modal-mask" id="editPwdModal">
    <div class="modal-box">
        <div class="modal-title">修改密码</div>
        <div class="input-row"><input type="password" id="oldPwd" placeholder="原密码"></div>
        <div class="input-row"><input type="password" id="newPwd" placeholder="新密码"></div>
        <div class="modal-btn">
            <button class="btn-cancel" onclick="closeModal('editPwdModal')">取消</button>
            <button class="btn-confirm" onclick="doChangePwd()">确认修改</button>
        </div>
    </div>
</div>

<script>
// ==========================
// 管理员统一规则（你要的最终版）
// ==========================
const ADMIN_USER = "admin";
const DEFAULT_PWD = "123456";

// 初始化管理员（第一次自动创建）
if (!localStorage.getItem("pwd_admin")) {
    localStorage.setItem("pwd_admin", DEFAULT_PWD);
    localStorage.setItem("safeQ_admin", "管理员默认密保");
    localStorage.setItem("safeA_admin", "admin");
}

// 切换标签
function switchTab(t) {
    document.querySelectorAll(".tab-item")[0].classList.toggle("active", t === "login");
    document.querySelectorAll(".tab-item")[1].classList.toggle("active", t === "reg");
    document.getElementById("loginForm").style.display = t === "login" ? "block" : "none";
    document.getElementById("regForm").style.display = t === "reg" ? "block" : "none";
}

// 密码显隐
function togglePwd(id) {
    let i = document.getElementById(id);
    i.type = i.type === "password" ? "text" : "password";
}

// 弹窗
function openModal(id) { document.getElementById(id).style.display = "flex" }
function closeModal(id) { document.getElementById(id).style.display = "none" }

// 退出登录（硬性保留）
function logout() {
    if (confirm("确定退出？")) {
        localStorage.clear();
        location.reload();
    }
}

// 登录
function login() {
    let user = document.getElementById("loginUser").value.trim();
    let pwd = document.getElementById("loginPwd").value.trim();
    if (!user || !pwd) return alert("请填写完整");

    let realPwd = localStorage.getItem("pwd_" + user);
    if (realPwd && realPwd === pwd) {
        localStorage.setItem("username", user);
        showAdmin();
        return;
    }
    alert("账号或密码错误");
}

// 注册
function register() {
    let u = document.getElementById("regUser").value.trim();
    let p = document.getElementById("regPwd").value.trim();
    let q = document.getElementById("safeQuestion").value;
    let a = document.getElementById("safeAnswer").value.trim();
    if (!u || !p || !q || !a) return alert("所有项必填");
    if (localStorage.getItem("pwd_" + u)) return alert("用户名已存在");

    localStorage.setItem("pwd_" + u, p);
    localStorage.setItem("safeQ_" + u, q);
    localStorage.setItem("safeA_" + u, a);
    alert("注册成功！");
    switchTab("login");
}

// 找回密码（管理员也能用）
function resetPwd() {
    let u = document.getElementById("findUser").value.trim();
    let a = document.getElementById("findAnswer").value.trim();
    let newP = document.getElementById("newFindPwd").value.trim();
    if (!u || !a || !newP) return alert("请填写完整");

    let realA = localStorage.getItem("safeA_" + u);
    if (!realA) return alert("用户不存在");
    if (realA !== a) return alert("密保答案错误");

    localStorage.setItem("pwd_" + u, newP);
    alert("密码重置成功！");
    closeModal("findModal");
}

// 修改密码（管理员也能用）
function doChangePwd() {
    let user = localStorage.getItem("username");
    let old = document.getElementById("oldPwd").value.trim();
    let newP = document.getElementById("newPwd").value.trim();

    let realOld = localStorage.getItem("pwd_" + user);
    if (old !== realOld) return alert("原密码错误");
    if (newP.length < 6) return alert("密码至少6位");

    localStorage.setItem("pwd_" + user, newP);
    alert("修改成功！请重新登录");
    closeModal("editPwdModal");
    logout();
}

// 进入后台
function showAdmin() {
    document.getElementById("authPage").style.display = "none";
    document.getElementById("adminPage").style.display = "block";
    document.getElementById("adminName").innerText = localStorage.getItem("username");
}

// 自动登录
window.onload = () => {
    if (localStorage.getItem("username")) showAdmin();
};
</script>
</body>
</html>
