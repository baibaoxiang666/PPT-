<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT接单系统 · 登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{
            background:linear-gradient(135deg,#409eff,#6c5ce7);
            height:100vh;display:flex;align-items:center;justify-content:center;
        }
        /* 登录卡片：圆角+柔阴影，好看不廉价 */
        .登录卡片{
            background:#fff;padding:45px;border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.15);width:380px;
        }
        .标题{text-align:center;font-size:24px;color:#333;margin-bottom:35px;}
        .输入框组{margin-bottom:20px;}
        label{display:block;color:#666;margin-bottom:8px;font-size:14px;}
        input{
            width:100%;padding:13px 16px;border:1px solid #eee;
            border-radius:8px;font-size:15px;transition:0.3s;
        }
        input:focus{border-color:#409eff;outline:none;}
        .按钮区域{display:flex;gap:12px;margin-top:25px;}
        .登录按钮{
            flex:1;padding:13px;border:none;border-radius:8px;
            background:#409eff;color:#fff;font-size:16px;cursor:pointer;
        }
        .注册按钮{
            flex:1;padding:13px;border:none;border-radius:8px;
            background:#f5f7fa;color:#333;font-size:16px;cursor:pointer;
        }
        .备注小字{text-align:center;margin-top:20px;font-size:12px;color:#999;}
    </style>
</head>
<body>
    <div class="登录卡片">
        <div class="标题">PPT接单管理系统</div>

        <div class="输入框组">
            <label>登录账号</label>
            <input type="text" id="账号输入" placeholder="输自己的账号">
        </div>
        <div class="输入框组">
            <label>登录密码</label>
            <input type="password" id="密码输入" placeholder="输自己的密码">
        </div>

        <div class="按钮区域">
            <button class="登录按钮" onclick="执行登录()">立即登录</button>
            <button class="注册按钮" onclick="执行注册()">账号注册</button>
        </div>

        <div class="备注小字">管理员账号：admin｜密码：123456</div>
    </div>

    <script src="cloud.js"></script>
    <script>
        async function 执行登录(){
            let 账号 = document.getElementById("账号输入").value;
            let 密码 = document.getElementById("密码输入").value;
            let 返回结果 = await login(账号,密码);
            if(返回结果.成功){alert("登录成功！跳转后台");location.href="index.html";}
            else{alert(返回结果.提示);}
        }
        async function 执行注册(){
            let 账号 = document.getElementById("账号输入").value;
            let 密码 = document.getElementById("密码输入").value;
            let 返回结果 = await register(账号,密码);
            alert(返回结果.提示);
        }
    </script>
</body>
</html>
