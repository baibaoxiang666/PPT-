<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<script src="https://qzonestyle.gtimg.cn/qzone/qzactStatics/configSystem/js/cloud/1.6.0/cloud.js"></script>
<style>
*{box-sizing:border-box;font-family:微软雅黑;margin:0;padding:0}
body{background:linear-gradient(135deg,#409eff,#6c5ce7);height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:white;width:380px;padding:40px;border-radius:16px;box-shadow:0 10px 40px #0000001a}
.title{text-align:center;font-size:22px;margin-bottom:20px}
.item{margin-bottom:14px;position:relative}
input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px}
.btn{width:100%;padding:12px;background:#409eff;color:white;border:none;border-radius:8px;margin-top:6px;cursor:pointer}
.tab{display:flex;gap:10px;margin-bottom:16px}
.tab button{flex:1;padding:8px;border:none;background:#f1f1f1;border-radius:8px;cursor:pointer}
.tab button.active{background:#409eff;color:white}
.page{display:none}
.page.active{display:block}
.eye-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;font-size:18px}
</style>
</head>
<body>

<div class="box">
  <div class="title">PPT接单管理系统</div>
  <div class="tab">
    <button class="active" onclick="goPage(0)">登录</button>
    <button onclick="goPage(1)">注册</button>
    <button onclick="goPage(2)">找回密码</button>
  </div>

  <div class="page active" id="page0">
    <div class="item"><input id="login_user" placeholder="账号"></div>
    <div class="item">
      <input type="password" id="login_pwd" placeholder="密码">
      <span class="eye-icon" onclick="togglePwd('login_pwd')">👁️</span>
    </div>
    <button class="btn" onclick="doLogin()">登录</button>
  </div>

  <div class="page" id="page1">
    <div class="item"><input id="reg_user" placeholder="账号"></div>
    <div class="item">
      <input type="password" id="reg_pwd" placeholder="密码">
      <span class="eye-icon" onclick="togglePwd('reg_pwd')">👁️</span>
    </div>
    <div class="item">
      <select id="reg_question">
        <option>你的小学名称？</option>
        <option>你的母亲姓名？</option>
        <option>你的生日？</option>
      </select>
    </div>
    <div class="item"><input id="reg_answer" placeholder="密保答案"></div>
    <button class="btn" onclick="doRegister()">注册</button>
  </div>

  <div class="page" id="page2">
    <div class="item"><input id="find_user" placeholder="账号"></div>
    <div class="item"><label id="show_question" style="padding:10px;background:#f5f5f5;border-radius:6px;display:block">请输入账号</label></div>
    <div class="item">
      <input type="password" id="find_answer" placeholder="密保答案">
      <span class="eye-icon" onclick="togglePwd('find_answer')">👁️</span>
    </div>
    <div class="item">
      <input type="password" id="find_newpwd" placeholder="新密码">
      <span class="eye-icon" onclick="togglePwd('find_newpwd')">👁️</span>
    </div>
    <button class="btn" onclick="doReset()">重置密码</button>
  </div>
</div>

<script src="cloud.js"></script>
<script>
let currentPage = 0;
function goPage(index) {
  currentPage = index;
  document.querySelectorAll(".page").forEach((p, i) => {
    p.classList.toggle("active", i === index);
  });
  document.querySelectorAll(".tab button").forEach((b, i) => {
    b.classList.toggle("active", i === index);
  });
}

function togglePwd(id) {
  const el = document.getElementById(id);
  const icon = document.querySelector(`[onclick="togglePwd('${id}')"]`);
  if (el.type === "password") {
    el.type = "text";
    icon.innerText = "🙈";
  } else {
    el.type = "password";
    icon.innerText = "👁️";
  }
}

// ==========================
// 登录
// ==========================
async function doLogin() {
  const u = document.getElementById("login_user").value.trim();
  const p = document.getElementById("login_pwd").value.trim();
  if (!u || !p) { alert("请输入账号密码"); return; }

  if (u === "admin" && p === "123456") {
    localStorage.setItem("currentUser", u);
    location.href = "index.html";
    return;
  }

  const res = await login(u, p);
  if (res.ok) location.href = "index.html";
  else alert(res.msg);
}

// ==========================
// ✅ 注册（修复 100% 可点）
// ==========================
async function doRegister() {
  console.log("点击注册"); // 测试用

  const u = document.getElementById("reg_user").value.trim();
  const p = document.getElementById("reg_pwd").value.trim();
  const q = document.getElementById("reg_question").value;
  const a = document.getElementById("reg_answer").value.trim();

  if (!u || !p || !a) {
    alert("请填写完整信息：账号、密码、密保答案");
    return;
  }

  const res = await register(u, p, q, a);
  alert(res.msg);
  if (res.ok) goPage(0);
}

// ==========================
// 重置密码
// ==========================
async function doReset() {
  const u = document.getElementById("find_user").value.trim();
  const a = document.getElementById("find_answer").value.trim();
  const np = document.getElementById("find_newpwd").value.trim();

  if (!u || !a || !np) { alert("请填写完整"); return; }

  const user = await findUser(u);
  if (!user) { alert("账号不存在"); return; }
  if (user.answer !== a) { alert("答案错误"); return; }

  await resetPwd(u, np);
  alert("重置成功！");
  goPage(0);
}

// 自动显示密保
document.getElementById("find_user").addEventListener("input", async () => {
  const u = document.getElementById("find_user").value.trim();
  if (!u) return;
  const user = await findUser(u);
  if (user) document.getElementById("show_question").innerText = "密保：" + user.question;
  else document.getElementById("show_question").innerText = "账号未注册";
});
</script>
</body>
</html>
