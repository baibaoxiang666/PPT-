<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPT接单管理系统</title>
  <script src="https://qzonestyle.gtimg.cn/qzone/qzactStatics/configSystem/js/cloud/1.6.0/cloud.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #409eff, #6c5ce7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      width: 380px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .title {
      text-align: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .tab {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #f1f1f1;
      cursor: pointer;
    }

    .tab button.active {
      background: #409eff;
      color: #fff;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .form-item {
      margin-bottom: 14px;
      position: relative;
    }

    .form-item input,
    .form-item select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      font-size: 18px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .tip-box {
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">PPT接单管理系统</div>

    <div class="tab">
      <button class="active" onclick="switchTab(0)">登录</button>
      <button onclick="switchTab(1)">注册</button>
      <button onclick="switchTab(2)">找回密码</button>
    </div>

    <!-- 登录 -->
    <div class="page active" id="page0">
      <div class="form-item">
        <input id="login_username" placeholder="账号">
      </div>
      <div class="form-item">
        <input type="password" id="login_pwd" placeholder="密码">
        <span class="eye-btn" onclick="togglePwd('login_pwd')">👁️</span>
      </div>
      <button class="submit-btn" onclick="handleLogin">登录</button>
    </div>

    <!-- 注册 -->
    <div class="page" id="page1">
      <div class="form-item">
        <input id="reg_username" placeholder="账号">
      </div>
      <div class="form-item">
        <input type="password" id="reg_pwd" placeholder="密码">
        <span class="eye-btn" onclick="togglePwd('reg_pwd')">👁️</span>
      </div>
      <div class="form-item">
        <select id="reg_question">
          <option>你的小学名称？</option>
          <option>你的母亲姓名？</option>
          <option>你的生日？</option>
        </select>
      </div>
      <div class="form-item">
        <input id="reg_answer" placeholder="密保答案">
      </div>
      <button class="submit-btn" onclick="handleRegister()">注册</button>
    </div>

    <!-- 找回密码 -->
    <div class="page" id="page2">
      <div class="form-item">
        <input id="find_username" placeholder="账号">
      </div>
      <div class="form-item">
        <div class="tip-box" id="show_question">请输入账号</div>
      </div>
      <div class="form-item">
        <input type="password" id="find_answer" placeholder="密保答案">
        <span class="eye-btn" onclick="togglePwd('find_answer')">👁️</span>
      </div>
      <div class="form-item">
        <input type="password" id="find_newpwd" placeholder="新密码">
        <span class="eye-btn" onclick="togglePwd('find_newpwd')">👁️</span>
      </div>
      <button class="submit-btn" onclick="handleReset()">重置密码</button>
    </div>
  </div>

  <script src="cloud.js"></script>
  <script>
    let currentTab = 0;

    // 切换页面
    function switchTab(index) {
      currentTab = index;
      document.querySelectorAll(".page").forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });
      document.querySelectorAll(".tab button").forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });
    }

    // 小眼睛切换密码可见
    function togglePwd(id) {
      const input = document.getElementById(id);
      const icon = document.querySelector(`[onclick="togglePwd('${id}')"]`);
      if (input.type === "password") {
        input.type = "text";
        icon.innerText = "🙈";
      } else {
        input.type = "password";
        icon.innerText = "👁️";
      }
    }

    // ==========================
    // 登录（管理员功能保留，界面不显示）
    // ==========================
    async function handleLogin() {
      const u = document.getElementById("login_username").value.trim();
      const p = document.getElementById("login_pwd").value.trim();

      if (!u || !p) {
        alert("请输入账号和密码");
        return;
      }

      // 管理员登录（功能保留，界面完全隐藏）
      if (u === "admin" && p === "123456") {
        localStorage.setItem("currentUser", u);
        location.href = "index.html";
        return;
      }

      const result = await loginUser(u, p);
      if (result.success) {
        location.href = "index.html";
      } else {
        alert(result.message);
      }
    }

    // ==========================
    // ✅ 注册（绝对无冲突、可点击）
    // ==========================
    async function handleRegister() {
      const u = document.getElementById("reg_username").value.trim();
      const p = document.getElementById("reg_pwd").value.trim();
      const q = document.getElementById("reg_question").value;
      const a = document.getElementById("reg_answer").value.trim();

      if (!u || !p || !a) {
        alert("请填写完整：账号、密码、密保答案");
        return;
      }

      const result = await createUser(u, p, q, a);
      alert(result.message);

      if (result.success) {
        switchTab(0);
      }
    }

    // ==========================
    // 重置密码
    // ==========================
    async function handleReset() {
      const u = document.getElementById("find_username").value.trim();
      const a = document.getElementById("find_answer").value.trim();
      const np = document.getElementById("find_newpwd").value.trim();

      if (!u || !a || !np) {
        alert("请填写完整信息");
        return;
      }

      const user = await findUserByUsername(u);
      if (!user) {
        alert("账号不存在");
        return;
      }

      if (user.answer !== a) {
        alert("密保答案错误");
        return;
      }

      const ok = await updateUserPassword(u, np);
      alert(ok ? "重置成功" : "重置失败");
      if (ok) switchTab(0);
    }

    // 自动加载密保问题
    document.getElementById("find_username").addEventListener("input", async () => {
      const u = document.getElementById("find_username").value.trim();
      if (!u) return;
      const user = await findUserByUsername(u);
      const tip = document.getElementById("show_question");
      if (user) {
        tip.innerText = "密保：" + user.question;
      } else {
        tip.innerText = "账号未注册";
      }
    });
  </script>
</body>
</html>
