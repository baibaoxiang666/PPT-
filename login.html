<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单管理系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 360px;
        }
        .login-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #666;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-login {
            background: #667eea;
            color: white;
        }
        .btn-login:hover {
            background: #5a6fe4;
        }
        .btn-register {
            background: #f0f0f0;
            color: #333;
        }
        .btn-register:hover {
            background: #e4e4e4;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>订单管理系统</h2>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="btn-group">
            <button class="btn-login" onclick="handleLogin()">登录</button>
            <button class="btn-register" onclick="handleRegister()">注册</button>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="./cloud.js"></script>
    <script>
        async function handleLogin() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (!username || !password) {
                alert("请输入账号和密码");
                return;
            }
            const result = await login(username, password);
            if (result.success) {
                alert("登录成功！");
                window.location.href = "./index.html";
            } else {
                alert(result.message);
            }
        }

        async function handleRegister() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (!username || !password) {
                alert("请输入账号和密码");
                return;
            }
            const result = await register(username, password);
            alert(result.message);
        }
    </script>
</body>
</html>
